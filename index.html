<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ecoPDF — Pier CyberPsychologue</title>
  <meta name="theme-color" content="#111111">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root{
      --bg:#111;
      --panel:#1b1b1b;
      --btn:#303030;
      --btn-active:#0065ff;
      --text:#fff;
      --ok:#1d8f44;
      --gap:.65rem;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      height:100vh;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    #toolbar{
      position:sticky;
      top:0;
      z-index:10;
      padding:.6rem;
      display:flex;
      flex-direction:column;
      gap:var(--gap);
      background:var(--panel);
      border-bottom:1px solid #2a2a2a;
    }

    .toolbar-main,
    .toolbar-settings{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:var(--gap);
    }

    button,label,select,input[type="range"]{
      border:none;
      border-radius:.75rem;
      padding:.8rem .55rem;
      background:var(--btn);
      color:var(--text);
      font-size:.95rem;
      font-weight:700;
      text-align:center;
      min-height:3rem;
      touch-action:manipulation;
      cursor:pointer;
    }

    input[type="range"]{
      padding:.6rem;
      cursor:pointer;
    }

    select{ appearance:none; }

    button:disabled{ opacity:.45; cursor:default; }
    .tool.active{ background:var(--btn-active); }
    #btnOpen{ background:#2959b8; }
    #btnDownload{ background:var(--ok); }

    .color-swatch{
      min-height:2.5rem;
      border:2px solid transparent;
      border-radius:.55rem;
      padding:0;
    }

    .color-swatch.active{ border-color:#fff; }

    #viewer{
      flex:1;
      overflow-y:auto;
      overflow-x:hidden;
      padding:.75rem;
      display:flex;
      flex-direction:column;
      gap:1rem;
      align-items:center;
      -webkit-overflow-scrolling:touch;
    }

    .page-wrap{
      position:relative;
      flex:0 0 auto;
      background:#fff;
      box-shadow:0 4px 22px rgba(0,0,0,.55);
      border-radius:.2rem;
      overflow:hidden;
    }

    .pdf-layer,
    .anno-layer,
    .text-layer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    .anno-layer{ z-index:2; touch-action:pan-y pinch-zoom; }
    .text-layer{
      z-index:3;
      pointer-events:none;
    }

    .text-item{
      position:absolute;
      min-width:1.5rem;
      min-height:1.2rem;
      color:#000;
      font:18px/1.2 Arial,sans-serif;
      white-space:pre-wrap;
      user-select:none;
      cursor:move;
      border:1px dashed transparent;
      padding:.08rem;
      pointer-events:auto;
    }

    .text-item.selected{ border-color:#0065ff; }

    .brand{
      text-align:center;
      font-size:.8rem;
      opacity:.8;
      padding:.45rem .6rem calc(.5rem + env(safe-area-inset-bottom));
      background:#101010;
      border-top:1px solid #2a2a2a;
    }

    @media (min-width:880px){
      .toolbar-main,
      .toolbar-settings{ grid-template-columns:repeat(10,minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-main">
      <label id="btnOpen">Ouvrir<input id="fileInput" type="file" accept="application/pdf" hidden></label>
      <button class="tool active" id="btnPen">Stylo</button>
      <button class="tool" id="btnHighlighter">Surligneur</button>
      <button class="tool" id="btnText">Texte</button>
      <button class="tool" id="btnEraser">Gomme</button>
      <button id="btnUndo" disabled>Annuler</button>
      <button id="btnZoomIn" disabled>Zoom +</button>
      <button id="btnZoomOut" disabled>Zoom -</button>
      <button id="btnFit" disabled>Ajuster largeur</button>
      <button id="btnDownload" disabled>Télécharger</button>
    </div>
    <div class="toolbar-settings">
      <button class="color-swatch active" data-color="0" style="background:#000000" title="Noir"></button>
      <button class="color-swatch" data-color="1" style="background:#d21d1d" title="Rouge"></button>
      <button class="color-swatch" data-color="2" style="background:#0f58c9" title="Bleu"></button>
      <button class="color-swatch" data-color="3" style="background:#0f8a38" title="Vert"></button>
      <input id="opacity" type="range" min="0.1" max="1" step="0.05" value="1" title="Opacité">
      <select id="widthSelect" title="Épaisseur">
        <option value="fin">Trait fin</option>
        <option value="moyen" selected>Trait moyen</option>
        <option value="epais">Trait épais</option>
      </select>
      <input id="eraserSize" type="range" min="8" max="60" step="2" value="24" title="Taille gomme">
    </div>
  </div>

  <main id="viewer"></main>
  <div class="brand">ecoPDF — Pier CyberPsychologue</div>

  <script>
    const COLORS = ["#000000", "#d21d1d", "#0f58c9", "#0f8a38"];
    const PEN_WIDTHS = { fin: 2, moyen: 4, epais: 7 };
    const HIGHLIGHT_WIDTHS = { fin: 10, moyen: 14, epais: 19 };

    const state = {
      pdfDoc: null,
      scale: 1,
      fitScale: 1,
      tool: "pen",
      colorIndex: 0,
      widthKey: "moyen",
      opacity: 1,
      eraserSize: 24,
      pages: []
    };

    const ui = {
      viewer: document.getElementById("viewer"),
      fileInput: document.getElementById("fileInput"),
      toolbar: document.getElementById("toolbar"),
      tools: {
        pen: document.getElementById("btnPen"),
        highlighter: document.getElementById("btnHighlighter"),
        text: document.getElementById("btnText"),
        eraser: document.getElementById("btnEraser")
      },
      undo: document.getElementById("btnUndo"),
      zoomIn: document.getElementById("btnZoomIn"),
      zoomOut: document.getElementById("btnZoomOut"),
      fit: document.getElementById("btnFit"),
      download: document.getElementById("btnDownload"),
      opacity: document.getElementById("opacity"),
      widthSelect: document.getElementById("widthSelect"),
      eraserSize: document.getElementById("eraserSize"),
      swatches: [...document.querySelectorAll(".color-swatch")]
    };

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

    function toolFromButton(id){
      return {
        btnPen:"pen",
        btnHighlighter:"highlighter",
        btnText:"text",
        btnEraser:"eraser"
      }[id];
    }

    function updateActiveTool(){
      Object.entries(ui.tools).forEach(([key, btn]) => {
        btn.classList.toggle("active", key === state.tool);
      });

      const drawMode = state.tool !== "text";
      state.pages.forEach(pageState => {
        pageState.annoCanvas.style.touchAction = drawMode ? "none" : "pan-y pinch-zoom";
      });
    }

    function setReady(ready){
      [ui.undo, ui.zoomIn, ui.zoomOut, ui.fit, ui.download].forEach(el => {
        el.disabled = !ready;
      });
    }

    function pushHistory(pageState){
      pageState.history.push(JSON.stringify(pageState.annotations));
      if(pageState.history.length > 100) pageState.history.shift();
      ui.undo.disabled = pageState.history.length === 0;
    }

    function restoreHistory(pageState){
      if(!pageState.history.length) return;
      const snap = pageState.history.pop();
      pageState.annotations = JSON.parse(snap);
      drawAnnotationLayer(pageState);
      ui.undo.disabled = pageState.history.length === 0;
    }

    function pagePoint(event, pageState){
      const rect = pageState.annoCanvas.getBoundingClientRect();
      const relX = (event.clientX - rect.left) / rect.width;
      const relY = (event.clientY - rect.top) / rect.height;

      return {
        x: Math.max(0, Math.min(1, relX)) * pageState.baseWidth,
        y: Math.max(0, Math.min(1, relY)) * pageState.baseHeight
      };
    }

    function currentStrokeWidth(tool){
      const widths = tool === "highlighter" ? HIGHLIGHT_WIDTHS : PEN_WIDTHS;
      return widths[state.widthKey];
    }

    function drawStroke(ctx, stroke, renderScaleX, renderScaleY){
      if(!stroke.points.length) return;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.globalCompositeOperation = stroke.tool === "eraser" ? "destination-out" : "source-over";
      ctx.globalAlpha = stroke.tool === "highlighter" ? Math.min(stroke.opacity, 0.6) : stroke.opacity;
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width * renderScaleX;

      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x * renderScaleX, stroke.points[0].y * renderScaleY);

      for(let i = 1; i < stroke.points.length; i++){
        const pt = stroke.points[i];
        ctx.lineTo(pt.x * renderScaleX, pt.y * renderScaleY);
      }

      ctx.stroke();
      ctx.restore();
    }

    function drawAnnotationLayer(pageState){
      const ctx = pageState.annoCanvas.getContext("2d");
      ctx.clearRect(0, 0, pageState.annoCanvas.width, pageState.annoCanvas.height);
      pageState.textLayer.innerHTML = "";

      const renderScaleX = pageState.annoCanvas.width / pageState.baseWidth;
      const renderScaleY = pageState.annoCanvas.height / pageState.baseHeight;
      const cssScaleX = pageState.cssWidth / pageState.baseWidth;
      const cssScaleY = pageState.cssHeight / pageState.baseHeight;

      pageState.annotations.forEach(entry => {
        if(entry.type === "stroke"){
          drawStroke(ctx, entry, renderScaleX, renderScaleY);
          return;
        }

        const textDiv = document.createElement("div");
        textDiv.className = "text-item";
        textDiv.dataset.id = entry.id;
        textDiv.textContent = entry.text;
        textDiv.style.left = `${entry.x * cssScaleX}px`;
        textDiv.style.top = `${entry.y * cssScaleY}px`;
        pageState.textLayer.appendChild(textDiv);
      });
    }

    function bindSettings(){
      ui.swatches.forEach(btn => {
        btn.addEventListener("click", () => {
          state.colorIndex = Number(btn.dataset.color);
          ui.swatches.forEach(el => el.classList.toggle("active", el === btn));
        });
      });

      ui.opacity.addEventListener("input", () => {
        state.opacity = Number(ui.opacity.value);
      });

      ui.widthSelect.addEventListener("change", () => {
        state.widthKey = ui.widthSelect.value;
      });

      ui.eraserSize.addEventListener("input", () => {
        state.eraserSize = Number(ui.eraserSize.value);
      });
    }

    function bindPageEvents(pageState){
      const pointers = new Map();
      let drawingStroke = null;
      let draggingText = null;

      pageState.annoCanvas.addEventListener("pointerdown", (event) => {
        pageState.active = true;
        state.pages.forEach(p => { if(p !== pageState) p.active = false; });
        ui.undo.disabled = pageState.history.length === 0;
        pointers.set(event.pointerId, true);

        if(pointers.size > 1) return;
        if(state.tool === "text") return;

        event.preventDefault();
        const p = pagePoint(event, pageState);

        drawingStroke = {
          type: "stroke",
          tool: state.tool,
          color: COLORS[state.colorIndex],
          width: state.tool === "eraser" ? state.eraserSize : currentStrokeWidth(state.tool),
          opacity: state.tool === "eraser" ? 1 : state.opacity,
          points: [p]
        };

        pageState.annoCanvas.setPointerCapture(event.pointerId);
      });

      pageState.annoCanvas.addEventListener("pointermove", (event) => {
        if(!drawingStroke || pointers.size > 1) return;
        event.preventDefault();
        drawingStroke.points.push(pagePoint(event, pageState));
        drawAnnotationLayer({
          ...pageState,
          annotations: [...pageState.annotations, drawingStroke]
        });
      });

      pageState.annoCanvas.addEventListener("pointerup", (event) => {
        pointers.delete(event.pointerId);
        if(!drawingStroke) return;
        pushHistory(pageState);
        pageState.annotations.push(drawingStroke);
        drawingStroke = null;
        drawAnnotationLayer(pageState);
      });

      pageState.annoCanvas.addEventListener("pointercancel", () => {
        drawingStroke = null;
        pointers.clear();
      });

      pageState.annoCanvas.addEventListener("click", (event) => {
        if(state.tool !== "text") return;

        const value = prompt("Texte à poser :");
        if(!value || !value.trim()) return;

        const p = pagePoint(event, pageState);
        pushHistory(pageState);

        pageState.annotations.push({
          type: "text",
          id: `txt-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
          text: value.trim(),
          x: p.x,
          y: p.y,
          color: "#000"
        });

        drawAnnotationLayer(pageState);
      });

      pageState.textLayer.addEventListener("pointerdown", (event) => {
        const target = event.target.closest(".text-item");
        if(!target || state.tool !== "text") return;

        event.preventDefault();
        const id = target.dataset.id;
        const entry = pageState.annotations.find(x => x.type === "text" && x.id === id);
        if(!entry) return;

        draggingText = {
          id,
          startClientX: event.clientX,
          startClientY: event.clientY,
          startX: entry.x,
          startY: entry.y
        };

        pageState.textLayer.querySelectorAll(".text-item").forEach(el => el.classList.remove("selected"));
        target.classList.add("selected");
      });

      pageState.textLayer.addEventListener("pointermove", (event) => {
        if(!draggingText || state.tool !== "text") return;

        event.preventDefault();
        const entry = pageState.annotations.find(x => x.type === "text" && x.id === draggingText.id);
        if(!entry) return;

        const rect = pageState.annoCanvas.getBoundingClientRect();
        const dxCss = event.clientX - draggingText.startClientX;
        const dyCss = event.clientY - draggingText.startClientY;

        entry.x = Math.max(0, draggingText.startX + dxCss * (pageState.baseWidth / rect.width));
        entry.y = Math.max(0, draggingText.startY + dyCss * (pageState.baseHeight / rect.height));

        drawAnnotationLayer(pageState);
      });

      pageState.textLayer.addEventListener("pointerup", () => {
        if(!draggingText || state.tool !== "text") return;
        pushHistory(pageState);
        draggingText = null;
      });

      pageState.textLayer.addEventListener("dblclick", (event) => {
        if(state.tool !== "text") return;

        const target = event.target.closest(".text-item");
        if(!target) return;

        const id = target.dataset.id;
        const idx = pageState.annotations.findIndex(x => x.type === "text" && x.id === id);
        if(idx === -1) return;

        const prev = pageState.annotations[idx].text;
        const next = prompt("Modifier (vide = supprimer)", prev);
        if(next === null) return;

        pushHistory(pageState);

        if(!next.trim()) pageState.annotations.splice(idx, 1);
        else pageState.annotations[idx].text = next.trim();

        drawAnnotationLayer(pageState);
      });
    }

    async function renderAllPages(){
      if(!state.pdfDoc) return;

      ui.viewer.innerHTML = "";
      const oldPages = state.pages;
      state.pages = [];

      for(let pageNum = 1; pageNum <= state.pdfDoc.numPages; pageNum++){
        const page = await state.pdfDoc.getPage(pageNum);
        const baseViewport = page.getViewport({ scale: 1 });

        const targetCssWidth = baseViewport.width * state.scale;
        const targetCssHeight = baseViewport.height * state.scale;

        const outputScale = window.devicePixelRatio || 1;
        const renderViewport = page.getViewport({ scale: state.scale });

        const wrap = document.createElement("section");
        wrap.className = "page-wrap";
        wrap.style.width = `${targetCssWidth}px`;
        wrap.style.height = `${targetCssHeight}px`;

        const pdfCanvas = document.createElement("canvas");
        pdfCanvas.className = "pdf-layer";
        pdfCanvas.width = Math.floor(renderViewport.width * outputScale);
        pdfCanvas.height = Math.floor(renderViewport.height * outputScale);

        const annoCanvas = document.createElement("canvas");
        annoCanvas.className = "anno-layer";
        annoCanvas.width = pdfCanvas.width;
        annoCanvas.height = pdfCanvas.height;

        const textLayer = document.createElement("div");
        textLayer.className = "text-layer";

        wrap.append(pdfCanvas, annoCanvas, textLayer);
        ui.viewer.appendChild(wrap);

        const pdfCtx = pdfCanvas.getContext("2d", { alpha: false });
        const renderTransform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

        await page.render({
          canvasContext: pdfCtx,
          transform: renderTransform,
          viewport: renderViewport
        }).promise;

        const previous = oldPages[pageNum - 1];

        const pageState = {
          index: pageNum,
          baseWidth: baseViewport.width,
          baseHeight: baseViewport.height,
          cssWidth: targetCssWidth,
          cssHeight: targetCssHeight,
          annotations: previous ? previous.annotations : [],
          history: previous ? previous.history : [],
          active: false,
          pdfCanvas,
          annoCanvas,
          textLayer
        };

        drawAnnotationLayer(pageState);
        bindPageEvents(pageState);
        state.pages.push(pageState);
      }

      setReady(true);
      ui.undo.disabled = true;
    }

    async function openPdf(file){
      const data = new Uint8Array(await file.arrayBuffer());

      try{
        state.pdfDoc = await pdfjsLib.getDocument({ data }).promise;
      }catch(err){
        console.error(err);
        alert("Impossible d’ouvrir ce PDF.");
        return;
      }

      state.pages = [];

      const firstPage = await state.pdfDoc.getPage(1);
      const base = firstPage.getViewport({ scale: 1 });
      state.fitScale = Math.max(0.35, (ui.viewer.clientWidth - 24) / base.width);
      state.scale = state.fitScale;

      await renderAllPages();
    }

    async function exportPdf(){
      if(!state.pages.length) return;

      const { jsPDF } = window.jspdf;
      const first = state.pages[0];

      const pdfOut = new jsPDF({
        unit: "px",
        format: [first.pdfCanvas.width, first.pdfCanvas.height]
      });

      for(let i = 0; i < state.pages.length; i++){
        const pageState = state.pages[i];

        const merged = document.createElement("canvas");
        merged.width = pageState.pdfCanvas.width;
        merged.height = pageState.pdfCanvas.height;

        const ctx = merged.getContext("2d", { alpha: false });
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, merged.width, merged.height);

        ctx.drawImage(pageState.pdfCanvas, 0, 0);
        ctx.drawImage(pageState.annoCanvas, 0, 0);

        const scaleX = merged.width / pageState.baseWidth;
        const scaleY = merged.height / pageState.baseHeight;

        ctx.fillStyle = "#000";
        ctx.textBaseline = "top";
        ctx.font = `${18 * scaleX}px Arial`;

        pageState.annotations.forEach(entry => {
          if(entry.type === "text"){
            ctx.fillText(entry.text, entry.x * scaleX, entry.y * scaleY);
          }
        });

        const img = merged.toDataURL("image/jpeg", 0.92);

        if(i > 0) pdfOut.addPage([merged.width, merged.height]);
        pdfOut.addImage(img, "JPEG", 0, 0, merged.width, merged.height, undefined, "FAST");
      }

      const cleanName = (ui.fileInput.files[0]?.name || "document.pdf").replace(/\.pdf$/i, "");
      pdfOut.save(`${cleanName}_ecopdf_annote.pdf`);
    }

    ui.toolbar.addEventListener("click", (event) => {
      const btn = event.target.closest("button");
      if(!btn || !btn.classList.contains("tool")) return;
      state.tool = toolFromButton(btn.id);
      updateActiveTool();
    });

    ui.fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if(!file) return;
      await openPdf(file);
    });

    ui.undo.addEventListener("click", () => {
      const active = state.pages.find(p => p.active) || state.pages[0];
      if(active) restoreHistory(active);
    });

    ui.zoomIn.addEventListener("click", async () => {
      state.scale = Math.min(3, state.scale * 1.15);
      await renderAllPages();
    });

    ui.zoomOut.addEventListener("click", async () => {
      state.scale = Math.max(0.35, state.scale / 1.15);
      await renderAllPages();
    });

    ui.fit.addEventListener("click", async () => {
      state.scale = state.fitScale;
      await renderAllPages();
    });

    ui.download.addEventListener("click", exportPdf);

    window.addEventListener("resize", async () => {
      if(!state.pdfDoc) return;
      const firstPage = await state.pdfDoc.getPage(1);
      const base = firstPage.getViewport({ scale: 1 });
      state.fitScale = Math.max(0.35, (ui.viewer.clientWidth - 24) / base.width);
    });

    bindSettings();
    updateActiveTool();
    setReady(false);
  </script>
</body>
</html>
